name: "Release Lumineria Launcher"

# Esto permite ejecutar la compilación manualmente desde un botón en GitHub
on:
  workflow_dispatch: 
  push:
    tags:
      - 'v*' # También se ejecutará si creas un tag como v1.0.0

jobs:
  build-tauri:
    permissions:
      contents: write # Necesario para crear la release
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest] # Compilará en Linux y Windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        # IMPORTANTE: Si usas pnpm o yarn, cambia este comando (ej: pnpm install)
        run: npm install

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Esto tomará la versión de tu src-tauri/tauri.conf.json
          tagName: v__VERSION__
          releaseName: 'Lumineria Launcher v__VERSION__'
          releaseBody: 'Nueva versión del launcher.'
          releaseDraft: false
          prerelease: false