name: "Release Lumineria Launcher"

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'   # Apple Silicon (M1 en adelante)
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'   # Intel (i7 y demás x86_64)
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Lumineria Launcher v__VERSION__'
          releaseBody: 'Nueva versión del launcher.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  build-flatpak:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generar generated-sources.json desde Cargo.lock
        run: |
          pip install --break-system-packages aiohttp tomlkit
          curl -L -o flatpak-cargo-generator.py https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
          python3 flatpak-cargo-generator.py src-tauri/Cargo.lock -o generated-sources.json

      - name: Construir el paquete Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: lumineria-launcher.flatpak
          manifest-path: org.astral.lumineria.Launcher.yml
          cache-key: flatpak-builder-${{ github.sha }}
          artifact-name: lumineria-launcher.flatpak

  upload-flatpak-release:
    runs-on: ubuntu-latest
    needs: [build-tauri, build-flatpak]
    permissions:
      contents: write
    steps:
      - name: Descargar el bundle generado
        uses: actions/download-artifact@v4
        with:
          name: lumineria-launcher-x86_64.flatpak

      - name: Subir Flatpak al Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} lumineria-launcher.flatpak