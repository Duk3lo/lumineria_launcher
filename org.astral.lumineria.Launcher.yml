app-id: org.astral.lumineria.Launcher
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: lumineria_launcher
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=host

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/lumineria-launcher/cargo

modules:
  - name: lumineria-launcher
    buildsystem: simple
    build-commands:
      - cargo --offline build --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/lumineria_launcher /app/bin/lumineria_launcher
    sources:
      - type: dir
        path: .
      - generated-sources.json